services:
  mongodb:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '4000:4000'
    depends_on:
      - mongodb
    environment:
      MONGO_URI: mongodb://mongodb:27017/employee_management
      PORT: '4000'
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_change_in_production}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      CORS_ORIGINS: http://localhost:4200,http://localhost:8080,http://127.0.0.1:4200

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        GRAPHQL_URL: http://localhost:4000/graphql
    ports:
      - '8080:80'
    depends_on:
      - backend

volumes:
  mongo-data:
