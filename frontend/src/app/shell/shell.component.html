<div class="shell">
  <mat-toolbar color="primary" class="toolbar">
    <span class="brand">EMS</span>
    <span class="spacer"></span>
    <a mat-button routerLink="/employees" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
      <mat-icon>groups</mat-icon>
      Employees
    </a>
    <a mat-button routerLink="/employees/search" routerLinkActive="active">
      <mat-icon>search</mat-icon>
      Search
    </a>
    <a mat-button routerLink="/employees/add" routerLinkActive="active">
      <mat-icon>person_add</mat-icon>
      Add
    </a>
    <button mat-icon-button [matMenuTriggerFor]="userMenu" aria-label="Account menu">
      <mat-icon>account_circle</mat-icon>
    </button>
    <mat-menu #userMenu="matMenu">
      <div class="menu-user" mat-menu-item disabled>
        {{ auth.currentUser()?.username }}
      </div>
      <button mat-menu-item type="button" (click)="logout()">
        <mat-icon>logout</mat-icon>
        Logout
      </button>
    </mat-menu>
  </mat-toolbar>

  <main class="content">
    <router-outlet />
  </main>
</div>
